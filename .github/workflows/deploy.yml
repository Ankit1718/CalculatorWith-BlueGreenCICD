name: Deploy Azure App

on:
  push:
    branches:
      - main

jobs:

# -----------------------------
# BUILD AND DEPLOY API
# -----------------------------

  build-deploy:
    runs-on: windows-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Publish application
      run: dotnet publish CalculatorTest.csproj -c Release -o ./publish

    - name: Deploy to Azure App Service (Staging)
      uses: azure/webapps-deploy@v2
      with:
        app-name: CalculatorProgram
        slot-name: staging
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish


# -----------------------------
# SWAP SLOT (BLUE-GREEN)
# -----------------------------

  swap-to-production:
    needs: build-deploy
    runs-on: windows-latest
    environment: production

    steps:

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Swap Staging to Production
      run: az webapp deployment slot swap --name CalculatorProgram --resource-group Calculator-rg --slot staging --target-slot production


# -----------------------------
# DEPLOY REACT UI
# -----------------------------

  deploy-ui:
    needs: swap-to-production
    runs-on: windows-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      working-directory: CalculatorTest-ui
      run: npm install

    - name: Build React app
      working-directory: CalculatorTest-ui
      run: npm run build

    - name: Deploy to Azure Static Web App
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "CalculatorTest-ui"
        output_location: "dist"
